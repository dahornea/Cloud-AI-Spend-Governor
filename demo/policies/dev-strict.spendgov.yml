version: 1
environment: dev
currency: EUR
defaultRegion: westeurope
hoursPerMonth: 730

budgets:
  dev:
    maxMonthlyDelta: 100
    maxMonthlyCost: 500
    action: block

policies:
  - id: dev-no-premium-skus
    title: "No premium SKUs in dev"
    description: "Development environments should avoid premium cloud SKUs."
    severity: fail
    environments:
      - dev
    match:
      provider: Azure
      skuContainsAny:
        - Premium
        - P1v3
        - P2v3
        - P3v3
    message: "Premium SKUs are not allowed in dev."
    recommendation: "Use Basic/Standard SKUs or apply environment-specific configuration."

  - id: warn-pricing-fallback
    title: "Warn on pricing fallback"
    severity: warn
    condition:
      pricingFallbackUsed: true
    message: "One or more resources used pricing fallback."
    recommendation: "Add a more specific SKU/region or pricing catalog entry."
