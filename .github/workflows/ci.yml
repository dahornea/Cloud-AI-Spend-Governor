name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and scenario tests
    runs-on: ubuntu-latest
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: "1"
      DOTNET_NOLOGO: "1"
      GitHub__Mode: Simulated
      GitHub__WebhookSecret: ""
      Pricing__AzureRetailPrices__Enabled: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CloudAiSpendGovernor.slnx --configfile NuGet.Config

      - name: Build
        run: dotnet build CloudAiSpendGovernor.slnx --configuration Release --no-restore

      - name: Run scenario test suite
        run: dotnet run --configuration Release --no-build --project tests/SpendGovernor.Tests/SpendGovernor.Tests.csproj

      - name: Run spendgov CLI smoke scan
        run: dotnet run --configuration Release --no-build --project src/SpendGovernor.Cli/SpendGovernor.Cli.csproj -- scan --path demo/scenario-expensive-cloud-change --markdown artifacts/spendgov-report.md --json artifacts/spendgov-report.json --output-sarif artifacts/spendgov.sarif --github-annotations --fail-on never --repository acme/shop-api --pr-number 42 --head-branch feature/dev-premium-redis --commit-sha ci-smoke

      - name: Upload spendgov CLI reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: spendgov-cli-reports
          path: |
            artifacts/spendgov-report.md
            artifacts/spendgov-report.json
            artifacts/spendgov.sarif

      - name: Publish API artifact
        run: dotnet publish src/SpendGovernor.Api/SpendGovernor.Api.csproj --configuration Release --no-build --output artifacts/spend-governor-api

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: spend-governor-api
          path: artifacts/spend-governor-api
