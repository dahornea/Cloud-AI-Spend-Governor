name: Cloud & AI Spend Governor Scan
description: Run Cloud & AI Spend Governor cost checks with Markdown, JSON, SARIF, and annotations.

inputs:
  path:
    description: Proposed repository/worktree path to scan.
    required: false
    default: "."
  baseline-path:
    description: Optional baseline directory for before/after comparisons.
    required: false
    default: ""
  markdown-report:
    description: Path for the Markdown report artifact.
    required: false
    default: "spendgov-report.md"
  json-report:
    description: Path for the JSON report artifact.
    required: false
    default: "spendgov-report.json"
  output-sarif:
    description: Path for the SARIF report artifact.
    required: false
    default: "spendgov.sarif"
  github-annotations:
    description: Emit GitHub Actions workflow annotations.
    required: false
    default: "true"
  annotations-min-severity:
    description: Minimum annotation severity: note, warning, or error.
    required: false
    default: "warning"
  upload-sarif:
    description: Upload SARIF to GitHub Code Scanning. Requires repository support and permissions.
    required: false
    default: "false"
  fail-on:
    description: Exit non-zero on fail, warn, or never.
    required: false
    default: "fail"
  repository:
    description: Repository identity, such as owner/name.
    required: false
    default: ""
  pr-number:
    description: Pull Request number.
    required: false
    default: "0"
  base-branch:
    description: Base branch name.
    required: false
    default: "main"
  head-branch:
    description: Head branch name.
    required: false
    default: "local"
  commit-sha:
    description: Commit SHA for report metadata.
    required: false
    default: "local"

outputs:
  markdown-report:
    description: Markdown report path.
    value: ${{ inputs.markdown-report }}
  json-report:
    description: JSON report path.
    value: ${{ inputs.json-report }}
  sarif-report:
    description: SARIF report path.
    value: ${{ inputs.output-sarif }}

runs:
  using: composite
  steps:
    - name: Run spendgov CLI
      shell: bash
      env:
        SPENDGOV_PATH: ${{ inputs.path }}
        SPENDGOV_BASELINE_PATH: ${{ inputs.baseline-path }}
        SPENDGOV_MARKDOWN_REPORT: ${{ inputs.markdown-report }}
        SPENDGOV_JSON_REPORT: ${{ inputs.json-report }}
        SPENDGOV_SARIF_REPORT: ${{ inputs.output-sarif }}
        SPENDGOV_GITHUB_ANNOTATIONS: ${{ inputs.github-annotations }}
        SPENDGOV_ANNOTATIONS_MIN_SEVERITY: ${{ inputs.annotations-min-severity }}
        SPENDGOV_FAIL_ON: ${{ inputs.fail-on }}
        SPENDGOV_REPOSITORY: ${{ inputs.repository }}
        SPENDGOV_PR_NUMBER: ${{ inputs.pr-number }}
        SPENDGOV_BASE_BRANCH: ${{ inputs.base-branch }}
        SPENDGOV_HEAD_BRANCH: ${{ inputs.head-branch }}
        SPENDGOV_COMMIT_SHA: ${{ inputs.commit-sha }}
      run: |
        set -euo pipefail

        cli_project="${GITHUB_ACTION_PATH}/../../../src/SpendGovernor.Cli/SpendGovernor.Cli.csproj"
        args=(
          scan
          --path "${SPENDGOV_PATH}"
          --markdown "${SPENDGOV_MARKDOWN_REPORT}"
          --json "${SPENDGOV_JSON_REPORT}"
          --output-sarif "${SPENDGOV_SARIF_REPORT}"
          --annotations-min-severity "${SPENDGOV_ANNOTATIONS_MIN_SEVERITY}"
          --fail-on "${SPENDGOV_FAIL_ON}"
          --pr-number "${SPENDGOV_PR_NUMBER}"
          --base-branch "${SPENDGOV_BASE_BRANCH}"
          --head-branch "${SPENDGOV_HEAD_BRANCH}"
          --commit-sha "${SPENDGOV_COMMIT_SHA}"
        )

        if [[ -n "${SPENDGOV_BASELINE_PATH}" ]]; then
          args+=(--baseline-path "${SPENDGOV_BASELINE_PATH}")
        fi

        if [[ -n "${SPENDGOV_REPOSITORY}" ]]; then
          args+=(--repository "${SPENDGOV_REPOSITORY}")
        fi

        if [[ "${SPENDGOV_GITHUB_ANNOTATIONS}" == "true" ]]; then
          args+=(--github-annotations)
        fi

        dotnet run --project "${cli_project}" -- "${args[@]}"

    - name: Upload SARIF to Code Scanning
      if: ${{ inputs.upload-sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output-sarif }}
